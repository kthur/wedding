name: Build and Release Wedding Planner Binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run pytest
        run: pytest

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Deploy to Firebase App Distribution
        if: "${{ secrets.FIREBASE_ANDROID_APP_ID != '' && secrets.FIREBASE_SERVICE_ACCOUNT != '' }}"
        uses: w9jds/firebase-action@v15.22.1
        with:
          args: appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk --app ${{ secrets.FIREBASE_ANDROID_APP_ID }} --groups testers
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Enable Developer Mode
        run: |
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /f /v "AllowDevelopmentWithoutDevLicense" /d 1

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Windows build
        run: flutter config --enable-windows-desktop

      - name: Build Windows App
        run: flutter build windows --release --verbose > windows_build.log 2>&1

      - name: Upload Windows Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: windows_build.log

      - name: Push Windows Build Log to Branch
        if: failure()
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan debug-logs-windows
          git rm -rf . --ignore-unmatch
          Copy-Item windows_build.log index.log
          git add index.log
          git commit -m "ci: save windows build log"
          git push -f origin HEAD:debug-logs-windows

      - name: Package Windows App (Zip)
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\windows-release.zip

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows-release.zip

  build-ios:
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS App (No Codesign)
        run: flutter build ios --release --no-codesign > ios_build.log 2>&1

      - name: Upload iOS Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ios_build.log

      - name: Push iOS Build Log to Branch
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan debug-logs-ios
          git rm -rf . --ignore-unmatch
          cp ios_build.log index.log
          git add index.log
          git commit -m "ci: save ios build log"
          git push -f origin HEAD:debug-logs-ios

      - name: Package iOS App (Zip)
        run: |
          cd build/ios/iphoneos
          zip -r Runner.zip Runner.app

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.zip

  create-release:
    needs: [build-android, build-windows, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: android-bin

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: windows-bin

      - name: Download iOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: ios-bin

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-bin/app-release.apk
            android-bin/app-release.aab
            windows-bin/windows-release.zip
            ios-bin/Runner.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-web-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web App
        run: flutter build web --release

      - name: Deploy to Firebase Hosting
        if: "${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}"
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: wedding-kthur
