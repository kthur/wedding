name: wedding_planner
description: 결혼 준비 앱 - 커플이 함께 사용하는 결혼 준비 플래너

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0

  # Social Login
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI
  cupertino_icons: ^1.0.6
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.10
  modal_bottom_sheet: ^3.0.0
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0

  # Export
  syncfusion_flutter_xlsio: ^26.2.11
  pdf: ^3.11.0
  printing: ^5.13.1
  path_provider: ^2.1.3
  share_plus: ^10.0.0
  sqflite: ^2.3.0
  path: ^1.9.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.2
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.ttf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.ttf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.ttf
          weight: 700
